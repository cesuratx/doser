[pins]
# BCM (GPIO) numbering — must match your physical wiring. See docs/guides/HARDWARE_SETUP.md.
hx711_dt = 5
hx711_sck = 6
motor_step = 23
motor_dir = 24
# motor_en = 25     # optional active-low enable; omit if not wired
# estop_in = 12     # optional E-stop input; omit if not wired

[filter]
ma_window = 5
median_window = 3
sample_rate_hz = 80

[control]
speed_bands = [
    { threshold_g = 1.0, sps = 1100 },
    { threshold_g = 0.5, sps = 450 },
    { threshold_g = 0.2, sps = 200 },
]
hysteresis_g = 0.07
epsilon_g = 0.08

[safety]
max_run_ms = 45000
max_overshoot_g = 0.6
no_progress_epsilon_g = 0.05
no_progress_ms = 1300

[timeouts]
sensor_ms = 50
settle_ms = 800

[predictor]
enabled = true
window = 6
extra_latency_ms = 40
min_progress_ratio = 0.15
